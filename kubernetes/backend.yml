apiVersion: apps/v1
kind: Deployment
metadata: 
  name: backend-deployment
  namespace: wanderlust
spec: 
  replicas: 1
  selector:
    matchLables:
      app: backend
  template:
    metadata: 
      name: backend
      labels:
        app: backend
    spec:
      containers: 
        - name: backend
          image: harshalg01/wanderlust-api:v3
          port:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

---
apiVersion: v1 
kind: Service
metadata:
  name: backend-service
  namespace: wanderlust
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      